<!DOCTYPE html>
<html lang="cs">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <style>

                text-shadow: 2px 5px 4px rgb(70, 69, 69), 10px 10px red;

            }
            h2 {

            }
            h3 {
                font-family: sans-serif;
                font-size: 60px;

                color: white;
                text-shadow: -15px 5px 20px rgb(19, 18, 18);

                background-color: black;
