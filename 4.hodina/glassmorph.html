<!DOCTYPE html>
<html lang="cs">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Glassmorph</title>
        <style>
            body {
                background-image: url(pexels-robert-nagy-512974-34112207.jpg);
                background-size: 20vh;
            }
            .karta {
                border: 1px solid red;
                border-radius: 10px;
                height: 250px;
                width: 250px;
                align-items: center;
                align-content: center;
                justify-content: center;
                padding: 20px;
                background-color: transparent;
                backdrop-filter: blur(15px);
                background-image: linear-gradient(
                    120deg,
                    rgba(255, 255, 255, 0.3),
                    rgba(0, 0, 0, 0.2)
                );
                background-size: 20px 20px;
                /* background-color: rgba(255, 255, 255, 0.2);
                backdrop-filter: blur(15px); */
            }
            .karta h2 {
                color: red;
            }
            .karta p {
                color: white;
                font-family: sans-serif;
            }
        </style>
    </head>
    <body>
        <div class="karta">
            <h2>Nadpis</h2>
            <p>
                Lorem ipsum dolor sit amet, consectetur adipisicing elit. Ab
                aperiam atque non voluptatibus vitae animi itaque mollitia
                excepturi architecto hic, numquam dolor. Accusamus aliquam
                facere eligendi quam rerum libero. Possimus?
            </p>
        </div>
    </body>
</html>
