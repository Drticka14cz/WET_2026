<!DOCTYPE html>
<html lang="cs">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>tlacitko</title>
        <style>
            .tlacitko {
                aspect-ratio: 4/1;
                height: 40px;
                background-color: orange;
                justify-content: center;
                align-content: center;
                padding: 10px;
                text-align: center;
                transition: background-color 2s linear;
            }
            .tlacitko:hover {
                background-color: blue;
            }
        </style>
    </head>
    <body>
        <div class="tlacitko">Dozvědět se víc</div>
    </body>
</html>
