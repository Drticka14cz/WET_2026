<!DOCTYPE html>
<html lang="cs">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Animace</title>
        <style>
            .triangle {
                width: 0px;
                height: 0px;
                border-style: solid;
                border-width: 0 105px 150px 105px;
                border-color: transparent transparent #ff4532 transparent;
            }
            .barak {
                width: 180px;
                aspect-ratio: 1/1;
                /* background-color: black; */
                border: solid 10px black;
                margin-left: 5px;
            }
            #ks {
                aspect-ratio: 1/2;
                height: 80px;
            }
            .koste {
                align-items: center;
                justify-content: center;
                position: absolute;
                aspect-ratio: 1/2;
                height: 100px;
                top: 210px;
                left: 20px;
                background-color: transparent;
                /* animation: zametani 0s alternate infinite,
                    zametani_rotate 0s alternate infinite; */
                /* alternate probíhá od 100% zpět */
            }
            .button {
                aspect-ratio: 3/1;
                height: 40px;
                border: 1px solid black;
                margin: 20px;
                text-align: center;
                align-content: center;
                background-color: gray;
            }
            .button:hover + .koste {
                background-color: transparent;
                animation: zametani 5s alternate infinite,
                    zametani_rotate 1s alternate infinite;
                /*alternate probíhá od 100% zpět*/
                /* animation-duration: 2s;
                animation-delay: 10ms; */
            }
            .button:hover {
                background-color: aqua;
            }
            .brno {
                background-color: yellow;
                width: 100px;
                height: 100px;
            }
            @keyframes zametani {
                0% {
                    translate: 0 0;
                }
                33% {
                    translate: 0px 40px;
                }
                66% {
                    translate: 140px 40px;
                }

                100% {
                    translate: 140px 0;
                }
            }
            @keyframes zametani_rotate {
                0% {
                    rotate: 30deg;
                }

                /* 50% {
                    rotate: deg;
                } */
                100% {
                    rotate: -30deg;
                }
            }
        </style>
    </head>
    <body>
        <div class="triangle"></div>
        <div class="barak"></div>
        <div class="button">Spustit animaci</div>

        <div class="koste"><img src="koste.png" alt="" id="ks" /></div>
    </body>
</html>
