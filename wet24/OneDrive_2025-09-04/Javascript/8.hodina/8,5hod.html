<html lang="cs">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>osmá a půltá hodina</title>
</head>
<body>
    <script>
        let znak = ["a", "b", "c", "d", "a", "a", "a", "a", "x"];
        let hledany = "a";
        let pocet = 0
        for(let i = 0; i < znak.length; i++){
            if(znak[i] === hledany){
                pocet = pocet + 1
            }

        }
        alert(pocet)
    </script>
