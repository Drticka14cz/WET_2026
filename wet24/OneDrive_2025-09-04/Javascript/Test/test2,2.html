<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test 22.4 2. úloha</title>
</head>
<body>
    <H1>Nadpis</H1>
    <a></a>
    
 
    
    <label for="hodnota" >hodnota</label>
    <input type="text" id="hodnota" placeholder="vaše známka"> 
    
        <input type="submit" id="pokracuj">
       <br>
       <a id="text">a</a>

    <script>
        
    let text = document.getElementById("text");
    let a = document.getElementById("pokracuj");  
    let znamka = document.getElementById("hodnota");
      let pole =[]  
   
    a.addEventListener("click", priklad)
    function priklad(){
        
        for(i=1 ; i <= znamka.value ; i++){
            pole.push("❤️")
            
        }
        text.innerText = pole
      
    }









    </script>
</body>
</html>
